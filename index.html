<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖經原文多功能查詢系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="search-container">
        <h1>🔍 聖經原文多功能查詢系統</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchMode('keyword')">關鍵字搜尋</button>
            <button class="tab-btn" onclick="switchMode('reverse')">原文反查模式</button>
        </div>

        <div id="panel-keyword" class="search-panel active">
            <input type="text" id="keyword" placeholder="請輸入中文關鍵字（支援簡繁自動轉換，如：光、忍耐）" onkeyup="if(event.key==='Enter') runSearch()">
            <button onclick="runSearch()">搜尋</button>
        </div>

        <div id="panel-reverse" class="search-panel">
            <textarea id="reverse-text" placeholder="請貼上聖經內文（例如：神愛世人，甚至將祂的獨生子...）" rows="3"></textarea>
            <input type="text" id="reverse-target" placeholder="想要反查的特定字眼（例如：愛）">
            <button onclick="runReverseSearch()">精準反查原文</button>
        </div>

        <div id="status" class="status">正在載入聖經資料庫...</div>
    </div>

    <div id="results-area" style="display: none;">
        <div class="testament-header" style="background:#8e44ad;">📖 舊約部分 <span id="ot-count" class="count-badge"></span></div>
        <div id="ot-results"><p class="no-result">無結果</p></div>
        
        <div class="testament-header" style="background:#2980b9;">📖 新約部分 <span id="nt-count" class="count-badge"></span></div>
        <div id="nt-results"><p class="no-result">無結果</p></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
