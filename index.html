<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖經原文詞義搜尋</title>
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; margin:30px; background-color: #fcfcfc; color: #333; }
        .search-container { max-width: 600px; margin: 0 auto 30px auto; text-align: center; }
        input[type="text"] { width: 70%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #8e44ad; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #732d91; }
        .status { margin-top: 10px; color: #666; font-style: italic; }
        
        /* 承襲你原本 Python 輸出的樣式 */
        .testament-header { background:#8e44ad; color:white; padding:12px; margin:30px 0 10px 0; border-radius:5px; font-size: 18px; font-weight: bold; }
        .group-title { background:#f5f5f5; border-left:5px solid #8e44ad; padding:10px; margin-top:25px; font-weight:bold; }
        table { width:100%; border-collapse:collapse; margin-bottom: 15px; background: white; }
        th, td { border:1px solid #ddd; padding:8px; text-align:left; }
        th { background:#fafafa; }
        .hl { color:red; font-weight:bold; }
        .group-divider { margin:35px 0; border: 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="search-container">
        <h1>🔍 聖經原文詞義搜尋</h1>
        <input type="text" id="keyword" placeholder="請輸入關鍵字（例如：光、忍耐）" onkeyup="if(event.key==='Enter') runSearch()">
        <button onclick="runSearch()">搜尋</button>
        <div id="status" class="status">正在載入聖經資料庫...</div>
    </div>

    <div id="results-area" style="display: none;">
        <div class="testament-header">📖 舊約部分</div>
        <div id="ot-results"><p>無結果</p></div>
        
        <div class="testament-header" style="background:#2980b9">📖 新約部分</div>
        <div id="nt-results"><p>無結果</p></div>
    </div>

<script>
const BOOK_MAP = {
    1: "創世記", 2: "出埃及記", 3: "利未記", 4: "民數記", 5: "申命記", 6: "約書亞記", 7: "士師記", 8: "路得記", 9: "撒母耳記上", 10: "撒母耳記下", 11: "列王紀上", 12: "列王紀下", 13: "歷代志上", 14: "歷代志下", 15: "以斯拉記", 16: "尼希米記", 17: "以斯帖記", 18: "約伯記", 19: "詩篇", 20: "箴言", 21: "傳道書", 22: "雅歌", 23: "賽亞書", 24: "耶利米書", 25: "耶利米哀歌", 26: "以西結書", 27: "但以理書", 28: "何西阿書", 29: "約珥書", 30: "阿摩司書", 31: "俄巴底亞書", 32: "約拿書", 33: "彌迦書", 34: "那鴻書", 35: "哈巴谷書", 36: "西番雅書", 37: "哈該書", 38: "撒迦利亞書", 39: "瑪拉基書", 40: "馬太福音", 41: "馬可福音", 42: "路加福音", 43: "約翰福音", 44: "使徒行傳", 45: "羅馬書", 46: "哥林多前書", 47: "哥林多後書", 48: "加拉太書", 49: "以弗所書", 50: "腓立比書", 51: "歌羅西書", 52: "帖撒羅尼迦前書", 53: "帖撒羅尼迦後書", 54: "提摩太前書", 55: "提摩太後書", 56: "提多書", 57: "腓利門書", 58: "希伯來書", 59: "雅各書", 60: "彼得前書", 61: "彼得後書", 62: "約翰一書", 63: "約翰二書", 64: "約翰三書", 65: "猶大書", 66: "啟示錄"
};

let bibleData = [];

// 網頁開啟時自動載入 JSON
window.onload = function() {
    fetch('./chinesetrad.json')
        .then(res => {
            if (!res.ok) throw new Error("無法讀取 chinesetrad.json");
            return res.json();
        })
        .then(data => {
            bibleData = data;
            document.getElementById('status').innerText = "資料庫載入完成，可以開始搜尋！";
        })
        .catch(err => {
            document.getElementById('status').innerText = "錯誤: 加載 JSON 失敗，請確認檔案路徑。";
            console.error(err);
        });
};

function cleanStrongs(text) {
    if (!text) return "";
    let t = String(text);
    t = t.replace(/[<{][GH]\d+[>}]/g, '');
    t = t.replace(/\b[GH]\d+\b/g, '');
    return t.trim();
}

function findAllStrongs(rawText, keyword) {
    const escaped = keyword.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'); // Escape regex
    const pattern = new RegExp(escaped + "((?:[<{][GH]\\d+[>}])+)", "g");
    
    let strongs = [];
    let match;
    while ((match = pattern.exec(rawText)) !== null) {
        const block = match[1];
        const subMatches = block.match(/[GH]\d+/g);
        if (subMatches) {
            strongs.push(...subMatches);
        }
    }
    return [...new Set(strongs)]; // 去重
}

function strongSortKey(s) {
    const match = s.match(/([GH])(\d+)/);
    if (!match) return { type: 'Z', num: 999999 };
    return { type: match[1], num: parseInt(match[2], 10) };
}

function sortStrongIds(a, b) {
    const keyA = strongSortKey(a);
    const keyB = strongSortKey(b);
    if (keyA.type !== keyB.type) return keyA.type.localeCompare(keyB.type);
    return keyA.num - keyB.num;
}

function escapeHtml(string) {
    return String(string).replace(/[&<>"']/g, function (s) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s];
    });
}

function buildSectionsHtml(groups, keyword) {
    let html = "";
    const sortedKeys = Object.keys(groups).sort(sortStrongIds);
    
    sortedKeys.forEach(strongId => {
        let verses = groups[strongId];
        
        // 排序經文 (卷 -> 章 -> 節)
        verses.sort((a, b) => {
            if (a.book_id !== b.book_id) return a.book_id - b.book_id;
            if (parseInt(a.chapter) !== parseInt(b.chapter)) return parseInt(a.chapter) - parseInt(b.chapter);
            return parseInt(a.verse) - parseInt(b.verse);
        });

        html += `
            <div class='group-title'> 原文編號: ${strongId} <span style='font-weight:normal;font-size:12px'> （共 ${verses.length} 節） </span> </div>
            <table>
                <thead>
                    <tr><th style='width:15%'>書卷</th><th style='width:10%'>章節</th><th>經文內容</th></tr>
                </thead>
                <tbody>
        `;

        verses.forEach(v => {
            const safeText = escapeHtml(v.text);
            const safeKeyword = escapeHtml(keyword);
            // 全域替換關鍵字為高亮標籤
            const highlighted = safeText.split(safeKeyword).join(`<span class='hl'>${safeKeyword}</span>`);
            
            html += `
                <tr>
                    <td>${v.book_name}</td>
                    <td>${v.chapter}:${v.verse}</td>
                    <td>${highlighted}</td>
                </tr>
            `;
        });

        html += `</tbody></table><hr class='group-divider'>`;
    });
    return html;
}

function runSearch() {
    const keyword = document.getElementById('keyword').value.trim();
    if (!keyword) return;
    if (bibleData.length === 0) {
        alert("資料庫尚未加載完成，請稍候。");
        return;
    }

    document.getElementById('status').innerText = "搜尋中...";
    
    let otGroups = {};
    let ntGroups = {};

    bibleData.forEach(entry => {
        const rawText = entry.text || "";
        if (!rawText.includes(keyword)) return;

        const bookId = parseInt(entry.book, 10);
        const strongIds = findAllStrongs(rawText, keyword);
        
        if (strongIds.length === 0) return;

        const verseData = {
            book_id: bookId,
            book_name: BOOK_MAP[bookId] || `未知(${bookId})`,
            chapter: entry.chapter,
            verse: entry.verse,
            text: cleanStrongs(rawText)
        };

        strongIds.forEach(strongId => {
            if (bookId <= 39) {
                if (!otGroups[strongId]) otGroups[strongId] = [];
                otGroups[strongId].push({...verseData});
            } else {
                if (!ntGroups[strongId]) ntGroups[strongId] = [];
                ntGroups[strongId].push({...verseData});
            }
        });
    });

    // 渲染 HTML
    const otHtml = Object.keys(otGroups).length ? buildSectionsHtml(otGroups, keyword) : "<p>無結果</p>";
    const ntHtml = Object.keys(ntGroups).length ? buildSectionsHtml(ntGroups, keyword) : "<p>無結果</p>";

    document.getElementById('ot-results').innerHTML = otHtml;
    document.getElementById('nt-results').innerHTML = ntHtml;
    document.getElementById('results-area').style.display = 'block';
    document.getElementById('status').innerText = "搜尋完畢！";
}
</script>
</body>
</html>
